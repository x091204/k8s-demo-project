apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  namespace: for-pvc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
        - name: nginx
          image: nginx:1.26.0
          volumeMounts:
            - name: data
              mountPath: /some/mount/path
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: pvc-auto