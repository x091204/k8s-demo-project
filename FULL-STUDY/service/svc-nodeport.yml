apiVersion: v1
kind: Service
metadata:
  name: nodeport-ip
  namespace: for-svc
  labels:
    svc: service-label
spec:
  type: NodePort
  selector:
    app: nginx-svc-test ## should match with the pods label
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
    nodePort: 30001 ## should be in b/w 30000 to 32767 